name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Deploy to gh-pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          # The branch the action should deploy to (GitHub Pages will serve from this branch)
          branch: gh-pages
          # The folder to publish. '.' will publish the repository root (including index.html)
          folder: .
          # Uses the automatically provided GITHUB_TOKEN
          token: ${{ secrets.GITHUB_TOKEN }}
          clean: true
